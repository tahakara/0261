<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otopark Yönetim Sistemi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .container { margin-top: 40px; }
        .table thead { background: #343a40; color: #fff; }
        .admin-btn { float: right; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Otopark Sistemi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="index.html">Otoparklar</a></li>
                <li class="nav-item"><a class="nav-link" href="#cars">Araçlar</a></li>
                <li class="nav-item"><a class="nav-link" href="#kiosk">Giriş/Çıkış</a></li>
            </ul>
            <span id="couch-status" class="badge bg-secondary">CouchDB: Kontrol ediliyor...</span>
            <a href="admin.html" class="btn btn-outline-light ms-3"><i class="fa fa-user-shield"></i> Admin</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="card mb-4" id="lots">
        <div class="card-header">Otoparklar</div>
        <div class="card-body">
            <button class="btn btn-primary mb-2" onclick="loadLots()"><i class="fa fa-sync"></i> Yenile</button>
            <table class="table table-bordered" id="lots">
                <thead>
                    <tr><th>Ad</th><th>Kapasite</th><th>Dolu</th><th>Konum</th><th>İşlem</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Yeni Otopark Ekle</div>
        <div class="card-body">
            <form id="addForm" class="row g-3">
                <div class="col-md-4"><input name="name" class="form-control" placeholder="Ad" required></div>
                <div class="col-md-3"><input name="capacity" type="number" class="form-control" placeholder="Kapasite" required></div>
                <div class="col-md-3"><input name="location" class="form-control" placeholder="Konum"></div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100"><i class="fa fa-plus"></i> Ekle</button></div>
            </form>
        </div>
    </div>
    <div class="card mt-4" id="cars">
        <div class="card-header">Araçlar</div>
        <div class="card-body">
            <button class="btn btn-primary mb-2" onclick="loadCars()"><i class="fa fa-sync"></i> Yenile</button>
            <table class="table table-bordered" id="cars">
                <thead>
                    <tr><th>Plaka</th><th>Marka</th><th>Model</th><th>Renk</th><th>Sahip</th><th>Otopark</th><th>İşlem</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div class="card mt-4" id="kiosk">
        <div class="card-header">Yeni Araç Ekle</div>
        <div class="card-body">
            <form id="addCarForm" class="row g-3">
                <div class="col-md-2"><input name="plate" class="form-control" placeholder="Plaka" required></div>
                <div class="col-md-2"><input name="brand" class="form-control" placeholder="Marka" required></div>
                <div class="col-md-2"><input name="model" class="form-control" placeholder="Model" required></div>
                <div class="col-md-2"><input name="color" class="form-control" placeholder="Renk" required></div>
                <div class="col-md-2"><input name="owner" class="form-control" placeholder="Sahip"></div>
                <div class="col-md-2"><select name="lot_id" class="form-select" id="carLotSelect"><option value="">Otopark Seç</option></select></div>
                <div class="col-md-12 mt-2"><button type="submit" class="btn btn-success w-100"><i class="fa fa-plus"></i> Ekle</button></div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // CouchDB bağlantı kontrolü
    async function checkCouchStatus() {
        try {
            const res = await fetch('/parking-lots/');
            if (res.ok) {
                document.getElementById('couch-status').className = 'badge bg-success';
                document.getElementById('couch-status').innerText = 'CouchDB: Bağlı';
            } else {
                document.getElementById('couch-status').className = 'badge bg-danger';
                document.getElementById('couch-status').innerText = 'CouchDB: Bağlantı Hatası';
            }
        } catch {
            document.getElementById('couch-status').className = 'badge bg-danger';
            document.getElementById('couch-status').innerText = 'CouchDB: Bağlantı Hatası';
        }
    }
    checkCouchStatus();
    async function loadLots() {
        const res = await fetch('/parking-lots/');
        const lots = await res.json();
        const tbody = document.querySelector('#lots tbody');
        tbody.innerHTML = '';
        lots.forEach(lot => {
            tbody.innerHTML += `<tr><td>${lot.name}</td><td>${lot.capacity}</td><td>${lot.occupied}</td><td>${lot.location||''}</td><td><button class='btn btn-danger btn-sm' onclick='delLot(\"${lot.id}\")'><i class='fa fa-trash'></i></button></td></tr>`;
        });
        // Lot select'i güncelle
        const lotSelect = document.getElementById('carLotSelect');
        if(lotSelect) {
            lotSelect.innerHTML = '<option value="">Otopark Seç</option>';
            lots.forEach(lot => {
                lotSelect.innerHTML += `<option value="${lot.id}">${lot.name}</option>`;
            });
        }
    }
    async function delLot(id) {
        await fetch(`/parking-lots/${id}`, {method:'DELETE'});
        loadLots();
    }
    // Sadece admin oturumunda otopark eklenebilir (örnek: localStorage'da admin flag varsa göster)
    if (!localStorage.getItem('is_admin')) {
        document.getElementById('addForm').style.display = 'none';
    }
    document.getElementById('addForm').onsubmit = async e => {
        e.preventDefault();
        const form = e.target;
        await fetch('/parking-lots/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: form.name.value,
                capacity: parseInt(form.capacity.value),
                location: form.location.value
            })
        });
        form.reset();
        loadLots();
    };
    // Araçlar
    async function loadCars() {
        const res = await fetch('/cars/');
        const cars = await res.json();
        const tbody = document.querySelector('#cars tbody');
        tbody.innerHTML = '';
        cars.forEach(car => {
            tbody.innerHTML += `<tr><td>${car.plate}</td><td>${car.brand}</td><td>${car.model}</td><td>${car.color}</td><td>${car.owner||''}</td><td>${car.lot_id||''}</td><td><button class='btn btn-danger btn-sm' onclick='delCar(\"${car.id}\")'><i class='fa fa-trash'></i></button></td></tr>`;
        });
    }
    async function delCar(id) {
        await fetch(`/cars/${id}`, {method:'DELETE'});
        loadCars();
    }
    document.getElementById('addCarForm').onsubmit = async e => {
        e.preventDefault();
        const form = e.target;
        await fetch('/cars/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                plate: form.plate.value,
                brand: form.brand.value,
                model: form.model.value,
                color: form.color.value,
                owner: form.owner.value,
                lot_id: form.lot_id.value
            })
        });
        form.reset();
        loadCars();
    };
    loadLots();
    loadCars();
</script>
</body>
</html>
