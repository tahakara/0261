<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Otopark Sistemi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .container { margin-top: 40px; }
        .table thead { background: #343a40; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">Admin Paneli <a href="index.html" class="btn btn-secondary"><i class="fa fa-home"></i> Ana Sayfa</a></h1>
    <!-- Kullanıcı yönetimi kaldırıldı, sadece 1 admin var -->
    <div class="alert alert-info">Sistemde sadece 1 admin (admin) kullanıcısı bulunmaktadır.</div>
    <div class="card mt-4">
        <div class="card-header">Giriş/Çıkış Kayıtları</div>
        <div class="card-body">
            <button class="btn btn-primary mb-2" onclick="loadTxs()"><i class="fa fa-sync"></i> Yenile</button>
            <table class="table table-bordered" id="txs">
                <thead>
                    <tr><th>Araç</th><th>Otopark</th><th>İşlem</th><th>Zaman</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadUsers() {
        const res = await fetch('/users/');
        const users = await res.json();
        const tbody = document.querySelector('#users tbody');
        tbody.innerHTML = '';
        users.forEach(user => {
            tbody.innerHTML += `<tr><td>${user.username}</td><td>${user.is_admin ? 'Evet' : 'Hayır'}</td><td><button class='btn btn-danger btn-sm' onclick='delUser("${user.id}")'><i class='fa fa-trash'></i></button></td></tr>`;
        });
    }
    async function delUser(id) {
        await fetch(`/users/${id}`, {method:'DELETE'});
        loadUsers();
    }
    document.getElementById('addUserForm').onsubmit = async e => {
        e.preventDefault();
        const form = e.target;
        await fetch('/users/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: form.username.value,
                password: form.password.value,
                is_admin: form.is_admin.value === 'true'
            })
        });
        form.reset();
        loadUsers();
    };
    async function loadTxs() {
        const res = await fetch('/transactions/');
        const txs = await res.json();
        const tbody = document.querySelector('#txs tbody');
        tbody.innerHTML = '';
        txs.forEach(tx => {
            tbody.innerHTML += `<tr><td>${tx.car_id}</td><td>${tx.lot_id}</td><td>${tx.action}</td><td>${tx.timestamp}</td></tr>`;
        });
    }
    loadUsers();
    loadTxs();
</script>
</body>
</html>
