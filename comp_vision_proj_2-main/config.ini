# Vision Editor Configuration
# This file contains default settings for the application

[Application]
name = Vision Editor
version = 1.0.0
default_mode = image

[Canvas]
default_width = 512
default_height = 512
background_color = #2b2b2b
zoom_min = 0.1
zoom_max = 10.0
zoom_step = 1.15

[Layers]
default_opacity = 100
default_blend_mode = Normal
max_layers = 100
thumbnail_size = 64

[Plugins]
plugin_directory = plugins
auto_load = true
enable_hot_reload = true

[UI]
theme = dark
window_width = 1400
window_height = 900
toolbar_icon_size = 24
left_sidebar_width = 200
right_sidebar_width = 300

[Performance]
max_image_size = 8192
use_hardware_acceleration = true
cache_size_mb = 500

[FileFormats]
supported_image_read = png,jpg,jpeg,bmp,tiff,webp
supported_image_write = png,jpg,bmp,tiff
supported_video_read = mp4,avi,mov,mkv
supported_video_write = mp4,avi

[Shortcuts]
# File operations
new = Ctrl+N
open = Ctrl+O
save = Ctrl+S
save_as = Ctrl+Shift+S
quit = Ctrl+Q

# View operations
zoom_in = Ctrl+Plus
zoom_out = Ctrl+Minus
fit_window = Ctrl+0
reset_view = Ctrl+R

# Edit operations
undo = Ctrl+Z
redo = Ctrl+Y
copy = Ctrl+C
paste = Ctrl+V
